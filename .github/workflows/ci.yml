name: Continuous Integration

on:
  push:
    branches:
      - '*'
    tags: "[0-9]+.[0-9]+.[0-9]+"

  pull_request_target:
    branches:
      - '*'
  #schedule:
    #- cron: '0 0,12 * * *'

jobs:
  #ci-skiphub:
    #if: github.event_name != 'pull_request'
    #uses: skiptools/skiphub/.github/workflows/ci.yml@main

  ci-linux:
    #runs-on: ubuntu-18.4
    runs-on: ubuntu-20.04
    #runs-on: ubuntu-22.04
    #runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Setup
        run: |
          # convert "refs/tags/1.0.0" to "1.0.0"
          # and "refs/heads/main" to "main"
          TAG=${GITHUB_REF#refs/*/}
          # the version if it matches the semantic tag pattern, otherwise "dev"
          echo "RELTAG=${TAG:-'dev'}" >> $GITHUB_ENV
          # the path to generate the artifacts (.ipa, .apk, etc.)
          echo "RELDIR=Skip/build/artifacts" >> $GITHUB_ENV

          echo "COMMIT_DATE=$(git log -1 --format=%ad --date=iso-strict ${TAG})" >> $GITHUB_ENV

      #- uses: swift-actions/setup-swift@v1
      - name: Get swift version
        run: swift --version

      - name: Install dependencies
        run: sudo apt-get install -y binutils git gnupg2 libc6-dev libcurl4 libcurl4-dev libedit2 libgcc-9-dev libpython2.7 libsqlite3-0 libstdc++-9-dev libxml2 libz3-dev pkg-config tzdata uuid-dev zlib1g-dev

      # checkout both skipstone.git and skip.git for the linked SkipDrive
      - name: Checkout skipstone.git
        uses: actions/checkout@v4
        with:
          path: skipstone

      - name: Checkout skip.git
        uses: actions/checkout@v4
        with:
          repository: skiptools/skip
          path: skip

      - name: Check kotlinc
        run: which kotlinc

      - name: Swift Test (Debug)
        working-directory: skipstone
        run: KOTLINC=kotlinc swift test -v -c debug --parallel

      - name: Build SkipRunner (Release)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        working-directory: skipstone
        run: |
          # needs a clean build or else we get linker errors
          rm -rf .build
          swift build --product SkipRunner -c release --static-swift-stdlib
          #swift build --product SkipKey -c release --static-swift-stdlib
          ls -lah .build/x86_64-unknown-linux-gnu/release/
          .build/x86_64-unknown-linux-gnu/release/SkipRunner version
          mkdir -p .build/dist/
          cp -a .build/x86_64-unknown-linux-gnu/release/SkipRunner .build/dist/skip
          cd .build/dist/
          zip -9 -q skip-linux-ubuntu-focal-${RELTAG}.zip skip
          ls -lah
          rm skip
          cd -

      - name: "Release"
        # disabled due to "HTTP 403: Resource not accessible by integration"
        # what we should do is add the file to the public release created at
        # https://github.com/skiptools/skip/releases
        # using a token with perimission to add to that repo
        if: false
        #if: startsWith(github.ref, 'refs/tags/')
        working-directory: skipstone
        env: 
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Creating release: ${RELTAG}"
          gh release create "${RELTAG}" -t "Release ${RELTAG}" --generate-notes .build/dist/*.*

      - name: "Upload Build Artifacts"
        # TODO: hand off to macBuild, which will publish the linux plugin
        # alongside the macOS one (once swift supports plugins on Linux)
        # if: false
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with: 
          path: skipstone/.build/dist

