name: Continuous Integration

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:

jobs:
  ci:
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - 'ubuntu-latest'
          - 'macos-latest'
          #- 'windows-latest'
        swift:
          - '6.2.3'

    steps:
      # checkout both skipstone.git and skip.git for the linked SkipDrive
      - name: Checkout skipstone.git
        uses: actions/checkout@v6
        with:
          path: skipstone

      - name: Checkout skip.git
        uses: actions/checkout@v6
        with:
          repository: skiptools/skip
          path: skip

      - uses: swift-actions/setup-swift@v3
        with:
          swift-version: ${{ matrix.swift }}

      - name: Get swift version
        run: swift --version

      - name: Check kotlinc
        run: which kotlinc

      - name: Swift Test (Debug)
        working-directory: skipstone
        run: KOTLINC=kotlinc swift test -v -c debug --parallel

      - name: Build plugin
        working-directory: skipstone
        shell: bash
        run: |
          # Build plugins using the current installed version of Swift
          export USE_SWIFTLY=0

          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            ./scripts/build_macos_plugin.sh
          elif [[ "${RUNNER_OS}" == "Linux" ]]; then
            # install the static linux SDK for MUSL cross-compilation
            curl -fsSL -o 'swift-static-linux-sdk.tar.gz' 'https://download.swift.org/swift-${{ matrix.swift }}-release/static-sdk/swift-${{ matrix.swift }}-RELEASE/swift-${{ matrix.swift }}-RELEASE_static-linux-0.0.1.artifactbundle.tar.gz'
            swift sdk install 'swift-static-linux-sdk.tar.gz'

            ./scripts/build_linux_plugin.sh
          else
            echo "::error::Unsupported platform: ${{ matrix.os }}"
            exit 1
          fi

