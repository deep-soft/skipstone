name: Continuous Integration

on:
  push:
    branches:
      - '*'
    tags: "[0-9]+.[0-9]+.[0-9]+"

  pull_request_target:
    branches:
      - '*'
  #schedule:
    #- cron: '0 0,12 * * *'

jobs:
  #ci-skiphub:
    #if: github.event_name != 'pull_request'
    #uses: skiptools/skiphub/.github/workflows/ci.yml@main

  ci-linux:
    #runs-on: ubuntu-18.4
    runs-on: ubuntu-20.04
    #runs-on: ubuntu-22.04
    #runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get swift version
        run: swift --version

      - name: Install dependencies
        run: sudo apt-get install -y libcurl4-openssl-dev

      # checkout both skipstone.git and skip.git for the linked SkipDrive
      - name: Checkout skipstone.git
        uses: actions/checkout@v4
        with:
          path: skipstone

      - name: Checkout skip.git
        uses: actions/checkout@v4
        with:
          repository: skiptools/skip
          path: skip

      - name: Check kotlinc
        run: which kotlinc

      - name: Swift Test (Debug)
        working-directory: skipstone
        run: KOTLINC=kotlinc swift test -v -c debug --parallel

      - name: Swift Build (Debug)
        #if: false
        #if: startsWith(github.ref, 'refs/tags/')
        working-directory: skipstone
        run: swift build --product SkipRunner -c debug --static-swift-stdlib

      - name: Swift Build (Release)
        if: false
        #if: startsWith(github.ref, 'refs/tags/')
        working-directory: skipstone
        run: swift build --product SkipRunner -c release --static-swift-stdlib

      - name: Copy skiptool
        #if: false
        #if: startsWith(github.ref, 'refs/tags/')
        working-directory: skipstone
        run: |
          tree .build/x86_64-unknown-linux-gnu/
          mkdir -p .build/dist/
          cp -a .build/x86_64-unknown-linux-gnu/*/SkipRunner .build/dist/skip
          cd .build/dist/
          zip -9 -q --symlinks skip skip-linux-ubuntu-focal.zip
          ls -lah
          rm skip
          cd -

      - name: "Upload Build Artifacts"
        # disabled since it uses storage credit
        # TODO: hand off to macBuild, which will publish the linux plugin
        # alongside the macOS one (once swift supports plugins on Linux)
        #if: startsWith(github.ref, 'refs/tags/')
        #if: false
        uses: actions/upload-artifact@v4
        with: 
          path: .build/dist
          working-directory: skipstone

